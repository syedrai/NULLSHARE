# /etc/nginx/sites-available/nullshare
# NullShare — Production Nginx Configuration
#
# Setup steps (Ubuntu/Debian):
#   sudo cp this-file /etc/nginx/sites-available/nullshare
#   sudo ln -s /etc/nginx/sites-available/nullshare /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then get TLS cert (replace yourdomain.com):
#   sudo certbot --nginx -d yourdomain.com
#
# For LAN/local use with mkcert (no real domain needed):
#   mkcert -install
#   mkcert nullshare.local
#   # Point nullshare.local to 127.0.0.1 in /etc/hosts
#   # Then set ssl_certificate paths below to the .pem files mkcert generates

# ─── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com;

    # Let's Encrypt ACME challenge path (certbot uses this)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # ── TLS Certificates (managed by certbot or mkcert) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # ── TLS Hardening ─────────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;            # Disable TLS 1.0 and 1.1
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling — speeds up TLS handshake
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Request Size Limit ────────────────────────────────────────────────────
    client_max_body_size 1m;    # API requests only (not file uploads)
    client_body_timeout 30s;
    client_header_timeout 30s;

    # ── Dashboard Access Control ──────────────────────────────────────────────
    # Restrict the sharer dashboard (/) to localhost only
    # Remove or adjust if dashboard needs to be accessible remotely
    location = / {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── API (sharer management) — localhost only ──────────────────────────────
    location /api/shares {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Share access API — public ─────────────────────────────────────────────
    location /api/access {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Signed download endpoint — public ────────────────────────────────────
    location /dl {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Allow large file downloads (no timeout on body)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Receiver share pages — public ─────────────────────────────────────────
    location /share/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── WebSocket for live logs (dashboard only) ──────────────────────────────
    location /ws/logs {
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Critical WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Keep WS alive
        proxy_read_timeout 86400s;   # 24 hours
        proxy_send_timeout 86400s;
    }

    # ── Static files ──────────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Deny hidden files (.git, .env, etc.) ─────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
